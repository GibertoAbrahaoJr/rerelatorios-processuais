services:
  - type: web
    name: relatorios-processuais-ia
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        value: troque-esta-senha
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_PROVIDER
        value: mock
      - key: DATAJUD_ENABLED
        value: false
